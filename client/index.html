<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camp With My Dog</title>
    <meta name="description" content="Camping trips planned around your dog — not just leashes allowed. Dog-friendly campsites, fire and weather safety, packing lists, and Leave No Trace built in." />
    <meta property="og:title" content="Camp With My Dog" />
    <meta property="og:description" content="Plan the perfect dog-friendly camping trip. Safety info, packing lists, maps, and Leave No Trace built in." />
    <meta property="og:url" content="https://campwithmydog.com" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Camp W/ My Dog" />
    <meta name="theme-color" content="#5c7a3e" />
    <!-- GoatCounter analytics -->
    <script data-goatcounter="https://campwithmydog.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              parchment: {
                50:  '#fefcf6',
                100: '#faf7f0',
                200: '#f2ede0',
                300: '#e8e0ca',
                400: '#d8cfa8',
                500: '#c8bc96',
              },
              bark: {
                900: '#2c2416',
                800: '#3d3020',
                700: '#4a3c28',
                600: '#6b5c42',
                500: '#9c8b6e',
              },
              olive: {
                700: '#3d5429',
                600: '#4a6332',
                500: '#5c7a3e',
                400: '#7a9a55',
                300: '#a2bc82',
              },
            },
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      * { font-family: 'Inter', -apple-system, sans-serif; }
      body { background-color: #f2ede0; }
      .fade-in { animation: fadeIn 0.4s ease-in; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      .card {
        background: #faf7f0;
        border: 1px solid #d8cfa8;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(100,80,40,0.08);
      }
      .card-inner { background: #f2ede0; border: 1px solid #cbbf96; border-radius: 8px; }
      input, textarea, select {
        background: #fffdf8 !important;
        border: 1px solid #c8bc96 !important;
        color: #2c2416 !important;
        border-radius: 8px !important;
      }
      input:focus, textarea:focus, select:focus {
        outline: none !important;
        border-color: #5c7a3e !important;
        box-shadow: 0 0 0 2px rgba(92,122,62,0.14) !important;
      }
      input::placeholder, textarea::placeholder { color: #a89478 !important; }
      .btn-primary {
        background: #5c7a3e;
        color: #faf7f0;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
      }
      .btn-primary:hover { background: #4a6332; box-shadow: 0 2px 8px rgba(92,122,62,0.28); }
      .btn-primary:active { background: #3d5429; box-shadow: none; }
      .btn-primary:disabled { opacity: 0.65; cursor: default; box-shadow: none; }
      .btn-ghost {
        background: transparent;
        color: #6b5c42;
        border: 1px solid #c8bc96;
        border-radius: 8px;
        transition: all 0.15s;
        cursor: pointer;
      }
      .btn-ghost:hover { border-color: #5c7a3e; color: #2c2416; }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
      }
      .pill-amber { background: rgba(92,122,62,0.12); color: #4a6332; border: 1px solid rgba(92,122,62,0.28); }
      .pill-green { background: rgba(45,106,45,0.10); color: #2d6a2d; border: 1px solid rgba(45,106,45,0.22); }
      .pill-red { background: rgba(185,28,28,0.08); color: #b91c1c; border: 1px solid rgba(185,28,28,0.18); }
      .pill-blue { background: rgba(92,122,62,0.10); color: #4a6332; border: 1px solid rgba(92,122,62,0.22); }
      .pill-slate { background: rgba(100,80,40,0.08); color: #7a6a50; border: 1px solid rgba(100,80,40,0.16); }
      .tag-btn {
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #c8bc96;
        color: #9c8b6e;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
      }
      .tag-btn:hover { border-color: #5c7a3e; color: #5c7a3e; }
      .tag-btn.selected { background: rgba(92,122,62,0.12); border-color: #5c7a3e; color: #4a6332; font-weight: 500; }
      .spinner {
        width: 20px; height: 20px;
        border: 2px solid rgba(92,122,62,0.25);
        border-top-color: #5c7a3e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f2ede0; }
      ::-webkit-scrollbar-thumb { background: #c8bc96; border-radius: 3px; }

      /* Responsive layout helpers */
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .hero-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .hero-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

      /* Nav logo: show full name on desktop, short name on mobile */
      .nav-logo-short { display: none; }
      .nav-logo-full { display: inline; }
      @media (max-width: 480px) {
        .nav-logo-short { display: inline; }
        .nav-logo-full { display: none; }
      }

      @media (max-width: 600px) {
        main { padding: 16px 14px 80px !important; }
        .grid-2 { grid-template-columns: 1fr; }
        .grid-3 { grid-template-columns: 1fr; }
        .hero-actions { width: 100%; justify-content: flex-start; }
        .tag-btn { padding: 8px 14px; font-size: 13px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
